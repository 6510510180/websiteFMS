<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLO/MLO ↔ รายวิชา — Sankey</title>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@500;700&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:'Sarabun',sans-serif;min-height:100vh}
header{padding:1.4rem 2rem 1rem;border-bottom:1px solid #21262d;background:linear-gradient(180deg,rgba(88,166,255,.06),transparent)}
h1{font-family:'Anuphan',sans-serif;font-size:1.4rem;font-weight:700;color:#e6edf3}
h1 em{color:#58a6ff;font-style:normal}
.sub{margin-top:.25rem;font-size:.82rem;color:#8b949e}
.bar{display:flex;align-items:center;flex-wrap:wrap;gap:.5rem;padding:.8rem 2rem;background:#161b22;border-bottom:1px solid #21262d}
.seg{display:flex;border:1px solid #30363d;border-radius:6px;overflow:hidden}
.seg button{font-family:'Sarabun',sans-serif;font-size:.78rem;padding:.32rem .85rem;background:transparent;color:#8b949e;border:none;cursor:pointer;transition:all .15s}
.seg button:not(:last-child){border-right:1px solid #30363d}
.seg button.on{background:rgba(88,166,255,.18);color:#58a6ff;font-weight:600}
.seg button:hover:not(.on){color:#c9d1d9;background:#21262d}
label{font-size:.78rem;color:#8b949e;margin-left:.8rem}
select{font-family:'Sarabun',sans-serif;font-size:.78rem;padding:.3rem .6rem;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;outline:none;cursor:pointer}
select:focus{border-color:#58a6ff}
.hint{margin-left:auto;font-size:.72rem;color:#484f58;font-style:italic}
#chart{padding:0;overflow:hidden}
svg{display:block}
#tt{position:fixed;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:.65rem .9rem;font-size:.78rem;pointer-events:none;opacity:0;transition:opacity .12s;z-index:999;max-width:300px;box-shadow:0 8px 24px rgba(0,0,0,.6);line-height:1.7}
.tt-h{color:#58a6ff;font-weight:600;margin-bottom:.2rem;font-size:.82rem}
.tt-s{color:#8b949e}
.tt-v{color:#e6edf3}
</style>
</head>
<body>
<header>
  <h1>หลักสูตรบริหารธุรกิจบัณฑิต 2567 — <em>PLO / MLO ↔ รายวิชา</em></h1>
  <p class="sub">Sankey แสดงความสัมพันธ์ระหว่าง PLO/MLO กับรายวิชา (I = Intro · R = Reinforce · M = Mastery) ข้อมูลจากเล่มหลักสูตร 2567</p>
</header>
<style>
/* PLO multi-select dropdown */
.plo-wrap{position:relative;display:inline-block}
.plo-btn{font-family:'Sarabun',sans-serif;font-size:.78rem;padding:.3rem .7rem;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;cursor:pointer;white-space:nowrap;min-width:110px;display:flex;align-items:center;gap:.4rem}
.plo-btn:hover{border-color:#58a6ff}
.plo-btn .arrow{margin-left:auto;font-size:.6rem;opacity:.5}
.plo-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:.4rem;z-index:200;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.plo-dropdown.open{display:block}
.plo-item{display:flex;align-items:center;gap:.5rem;padding:.28rem .5rem;border-radius:5px;cursor:pointer;font-size:.78rem;color:#c9d1d9;user-select:none}
.plo-item:hover{background:#21262d}
.plo-item input{accent-color:#58a6ff;cursor:pointer}
.plo-sep{height:1px;background:#30363d;margin:.3rem 0}
.plo-all{font-weight:600;color:#8b949e;font-size:.74rem}
</style>
<div class="bar">
  <div class="seg" id="dirSeg">
    <button class="on" onclick="setDir('plo2course',this)">PLO/MLO → รายวิชา</button>
    <button onclick="setDir('course2plo',this)">รายวิชา → PLO/MLO</button>
  </div>
  <label>วิชาเอก:</label>
  <select id="majorSel" onchange="onMajorChange()">
    <option value="fin">การเงินและการลงทุน</option>
    <option value="mkt">การตลาดและการสื่อสาร</option>
    <option value="hrm">การจัดการทรัพยากรมนุษย์</option>
    <option value="log">โลจิสติกส์และโซ่อุปทาน</option>
    <option value="bis">ระบบสารสนเทศทางธุรกิจ</option>
    <option value="mice">การจัดการไมซ์</option>
  </select>
  <label>กลุ่มวิชา:</label>
  <select id="groupSel" onchange="render()">
    <option value="all">ทั้งหมด</option>
    <option value="ge">GE · วิชาทั่วไป</option>
    <option value="core">วิชาแกน</option>
    <option value="required">วิชาชีพบังคับ</option>
    <option value="elective">วิชาชีพเลือก</option>
  </select>
  <label>แสดง:</label>
  <select id="ploTypeSel" onchange="onPloTypeChange()">
    <option value="plo">PLO เท่านั้น (9 ตัว)</option>
    <option value="mlo">MLO เท่านั้น</option>
    <option value="both">PLO + MLO</option>
  </select>
  <!-- PLO/MLO multi-select -->
  <label>เลือก PLO/MLO:</label>
  <div class="plo-wrap" id="ploWrap">
    <div class="plo-btn" id="ploBtn" onclick="togglePloDropdown(event)">
      <span id="ploBtnLabel">ทั้งหมด</span>
      <span class="arrow">▼</span>
    </div>
    <div class="plo-dropdown" id="ploDropdown">
      <div class="plo-item plo-all" onclick="selectAllPlo(true)">✓ เลือกทั้งหมด</div>
      <div class="plo-item plo-all" onclick="selectAllPlo(false)">✗ ยกเลิกทั้งหมด</div>
      <div class="plo-sep"></div>
      <div id="ploCheckList"></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:.5rem;margin-left:auto">
    <span style="font-size:.72rem;color:#484f58">ระดับ:</span>
    <span style="display:flex;align-items:center;gap:.3rem;font-size:.75rem;padding:.25rem .6rem;border-radius:4px;background:#1c2128;border:1px solid #30363d"><span style="width:10px;height:10px;border-radius:2px;background:#484f58;display:inline-block"></span><span style="color:#8b949e">I</span></span>
    <span style="display:flex;align-items:center;gap:.3rem;font-size:.75rem;padding:.25rem .6rem;border-radius:4px;background:#1c2128;border:1px solid #30363d"><span style="width:10px;height:10px;border-radius:2px;background:#3d6b9e;display:inline-block"></span><span style="color:#8b949e">R</span></span>

    <span style="font-size:.72rem;color:#484f58;margin-left:.4rem">· hover/คลิกเส้น</span>
  </div>
</div>
<div id="chart"></div>
<div id="tt"></div>

// ─── SANKEY LAYOUT ────────────────────────────────────────────────────────────
function sankey(rawNodes, rawLinks, W, H, nodeW, pad) {
  const nodes = rawNodes.map((n,i)=>({...n,i,sl:[],tl:[]}));
  const links = rawLinks.map(l=>({...l, src:nodes[l.s], tgt:nodes[l.t]}));
  links.forEach(l=>{ l.src.sl.push(l); l.tgt.tl.push(l); });
  nodes.forEach(n=>{ n.v = Math.max(n.sl.reduce((a,l)=>a+l.v,0), n.tl.reduce((a,l)=>a+l.v,0), 1); });
  const maxCol = Math.max(...nodes.map(n=>n.col));
  const gap = (W - nodeW) / Math.max(maxCol,1);
  nodes.forEach(n=>{ n.x0=n.col*gap; n.x1=n.x0+nodeW; });
  const cols = {};
  nodes.forEach(n=>{ (cols[n.col]=cols[n.col]||[]).push(n); });
  Object.values(cols).forEach(col=>{
    const sumV=col.reduce((a,n)=>a+n.v,0);
    const scale=(H-pad*(col.length-1))/sumV;
    let y=0; col.forEach(n=>{ n.y0=y; n.h=Math.max(n.v*scale,2); n.y1=n.y0+n.h; y+=n.h+pad; });
  });
  Object.values(cols).forEach(col=>{ col.forEach((n,i)=>{ n._origOrder=i; }); });
  for(let it=0;it<40;it++){
    Object.entries(cols).forEach(([c,col])=>{
      col.forEach(n=>{
        const all=[...n.sl.map(l=>(l.tgt.y0+l.tgt.y1)/2),...n.tl.map(l=>(l.src.y0+l.src.y1)/2)];
        n._cy = all.length ? all.reduce((a,b)=>a+b,0)/all.length : (n.y0+n.y1)/2;
      });
      const hasPlo = col.some(n=>n.kind==='plo');
      if(hasPlo) col.sort((a,b)=>a._origOrder-b._origOrder);
      else col.sort((a,b)=>a._cy-b._cy);
      const sumV=col.reduce((a,n)=>a+n.v,0);
      const scale=(H-pad*(col.length-1))/sumV;
      let y=0; col.forEach(n=>{ n.y0=y; n.h=Math.max(n.v*scale,2); n.y1=n.y0+n.h; y+=n.h+pad; });
    });
  }
  nodes.forEach(n=>{ n._sy=n.y0; n._ty=n.y0; });
  links.forEach(l=>{
    const sh=(l.v/l.src.v)*l.src.h, th=(l.v/l.tgt.v)*l.tgt.h;
    l.sy0=l.src._sy; l.sy1=l.sy0+sh; l.src._sy+=sh;
    l.ty0=l.tgt._ty; l.ty1=l.ty0+th; l.tgt._ty+=th;
    l.bw=Math.max((sh+th)/2,1);
  });
  return {nodes,links};
}

function bandPath(l){
  const x0=l.src.x1,x1=l.tgt.x0,mx=(x0+x1)/2;
  return `M${x0},${l.sy0} C${mx},${l.sy0} ${mx},${l.ty0} ${x1},${l.ty0} L${x1},${l.ty1} C${mx},${l.ty1} ${mx},${l.sy1} ${x0},${l.sy1} Z`;
}

// ─── PLO/MLO multi-select state ──────────────────────────────────────────────
let selectedPloIds = new Set(); // ids to HIDE (unchecked)

const MLO_BY_MAJOR = {
  fin:  ['MLO1_1','MLO1_2','MLO1_3'],
  mkt:  ['MLO2_1','MLO2_2','MLO2_3'],
  hrm:  ['MLO3_1','MLO3_2'],
  log:  ['MLO4_1','MLO4_2'],
  bis:  ['MLO5_1','MLO5_2'],
  mice: ['MLO6_1','MLO6_2'],
};

function buildPloChecklist(){
  const mid = document.getElementById('majorSel').value;
  const ploType = document.getElementById('ploTypeSel').value;
  const list = document.getElementById('ploCheckList');
  list.innerHTML = '';
  let items = [];
  if(ploType==='plo'||ploType==='both') items = PLO_INFO.map((p,i)=>({id:p.id,name:p.name,color:PLO_C[i%PLO_C.length]}));
  if(ploType==='mlo'||ploType==='both'){
    const mloIds = MLO_BY_MAJOR[mid]||[];
    MLO_INFO.filter(m=>mloIds.includes(m.id)).forEach(m=>items.push({id:m.id,name:m.name,color:'#8b949e'}));
  }
  const validIds = new Set(items.map(i=>i.id));
  for(const id of [...selectedPloIds]) if(!validIds.has(id)) selectedPloIds.delete(id);
  items.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'plo-item';
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.checked = !selectedPloIds.has(item.id);
    chk.addEventListener('change', ()=>{
      if(chk.checked) selectedPloIds.delete(item.id);
      else selectedPloIds.add(item.id);
      updatePloBtnLabel(items);
      render();
    });
    const dot = document.createElement('span');
    dot.style.cssText = `width:9px;height:9px;border-radius:2px;background:${item.color};display:inline-block;flex-shrink:0`;
    const lbl = document.createElement('span');
    lbl.textContent = item.name;
    div.appendChild(chk); div.appendChild(dot); div.appendChild(lbl);
    list.appendChild(div);
  });
  updatePloBtnLabel(items);
}

function updatePloBtnLabel(items){
  const lbl = document.getElementById('ploBtnLabel');
  const hidden = selectedPloIds.size;
  if(hidden===0) lbl.textContent='ทั้งหมด';
  else if(hidden>=items.length) lbl.textContent='ไม่มี';
  else lbl.textContent=`${items.length-hidden}/${items.length} ตัว`;
}

function togglePloDropdown(e){
  e.stopPropagation();
  document.getElementById('ploDropdown').classList.toggle('open');
}
document.addEventListener('click',()=>{ const d=document.getElementById('ploDropdown'); if(d) d.classList.remove('open'); });

function selectAllPlo(checked){
  const mid = document.getElementById('majorSel').value;
  const ploType = document.getElementById('ploTypeSel').value;
  let allIds = [];
  if(ploType==='plo'||ploType==='both') PLO_INFO.forEach(p=>allIds.push(p.id));
  if(ploType==='mlo'||ploType==='both') (MLO_BY_MAJOR[mid]||[]).forEach(id=>allIds.push(id));
  selectedPloIds.clear();
  if(!checked) allIds.forEach(id=>selectedPloIds.add(id));
  buildPloChecklist();
  render();
}

  buildPloChecklist();

function buildGraph(){
  const mid = document.getElementById('majorSel').value;
  const ploType = document.getElementById('ploTypeSel').value;
  const grpFilter = document.getElementById('groupSel').value;
  let courses = COURSES[mid] || [];
  if(grpFilter !== 'all') courses = courses.filter(([,,g])=>g===grpFilter);

  // PLO/MLO node list — MLO เฉพาะของสาขานั้น
  let ploNodes = [];
  if(ploType==='plo'||ploType==='both') ploNodes=[...PLO_INFO];
  if(ploType==='mlo'||ploType==='both'){
    const mloIds = new Set(MLO_BY_MAJOR[mid]||[]);
    ploNodes=[...ploNodes,...MLO_INFO.filter(m=>mloIds.has(m.id))];
  }

  // กรองตาม multi-select (selectedPloIds = ที่ถูก uncheck)
  if(selectedPloIds.size>0) ploNodes = ploNodes.filter(p=>!selectedPloIds.has(p.id));

  const usedPLO = new Set();
  courses.forEach(([,,,map])=>Object.keys(map).forEach(k=>usedPLO.add(k)));
  ploNodes = ploNodes.filter(p=>usedPLO.has(p.id));

  // MLO mode: กรองเฉพาะวิชาที่มี MLO ของสาขาอย่างน้อย 1 ตัว
  if(ploType==='mlo'){
    const mloIds = new Set(MLO_BY_MAJOR[mid]||[]);
    courses = courses.filter(([,,,map])=>Object.keys(map).some(k=>mloIds.has(k)));
  }

  // กรองวิชาที่ไม่เชื่อมกับ ploNode ที่เลือกออก
  if(selectedPloIds.size>0){
    const visibleIds = new Set(ploNodes.map(p=>p.id));
    courses = courses.filter(([,,,map])=>Object.keys(map).some(k=>visibleIds.has(k)));
  }

  const rawNodes=[], nm={};
  const add=(id,label,col,color,meta={})=>{ nm[id]=rawNodes.length; rawNodes.push({id,label,col,color,...meta}); };
  const LEVEL_VAL={I:1,R:2,M:3};

  if(dir==='plo2course'){
    ploNodes.forEach((p,i)=>{ add(p.id,p.name,0,PLO_C[i%PLO_C.length],{kind:'plo',full:p.full}); });
    courses.forEach(([code,name,grp,map])=>{ add('c_'+code,code,1,MC[mid],{kind:'course',code,fullname:name,grp,map}); });
  } else {
    courses.forEach(([code,name,grp,map])=>{ add('c_'+code,code,0,MC[mid],{kind:'course',code,fullname:name,grp,map}); });
    ploNodes.forEach((p,i)=>{ add(p.id,p.name,1,PLO_C[i%PLO_C.length],{kind:'plo',full:p.full}); });
  }

  const rawLinks=[];
  courses.forEach(([code,,,map])=>{
    const cid='c_'+code;
    Object.entries(map).forEach(([pkey,lv])=>{
      if(!(pkey in nm)) return;
      const v=LEVEL_VAL[lv]||1;
      const pi=ploNodes.findIndex(p=>p.id===pkey);
      const pc=PLO_C[pi%PLO_C.length]||'#58a6ff';
      if(dir==='plo2course') rawLinks.push({s:nm[pkey],t:nm[cid],v,lv,color:pc});
      else rawLinks.push({s:nm[cid],t:nm[pkey],v,lv,color:MC[mid]});
    });
  });

  const linkMap={};
  rawLinks.forEach(l=>{ const k=`${l.s}:${l.t}`; if(linkMap[k]) linkMap[k].v+=l.v; else linkMap[k]={...l}; });
  return {rawNodes, dedupLinks:Object.values(linkMap)};
}

const toRgba=(h,a)=>{ try{const r=parseInt(h.slice(1,3),16),g2=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g2},${b},${a})`;}catch{return`rgba(88,166,255,${a})`;} };
let activeLink=null;

function render(){
  const container=document.getElementById('chart');
  container.innerHTML=''; activeLink=null;
  const {rawNodes,dedupLinks}=buildGraph();
  const mid=document.getElementById('majorSel').value;
  const ctrlH=document.querySelector('.bar').getBoundingClientRect().bottom;
  const viewH=window.innerHeight-ctrlH-16;
  const W=container.clientWidth-4;
  const lblL=170,lblR=170;
  const margin={top:30,right:lblR,bottom:12,left:lblL};
  const iW=W-margin.left-margin.right, iH=viewH-margin.top-margin.bottom;
  const {nodes,links}=sankey(rawNodes,dedupLinks,iW,iH,22,5);
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',W); svg.setAttribute('height',viewH);
  svg.style.display='block'; container.appendChild(svg);
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform',`translate(${margin.left},${margin.top})`);
  svg.appendChild(g);

  const grpLabel={all:'ทั้งหมด',ge:'GE',core:'วิชาแกน',required:'วิชาชีพบังคับ',elective:'วิชาชีพเลือก'};
  const grpSel=document.getElementById('groupSel').value;
  const courseColLabel='รายวิชา'+(grpSel!=='all'?' ('+grpLabel[grpSel]+')':'');
  const colLabels=dir==='plo2course'?['PLO / MLO',courseColLabel]:[courseColLabel,'PLO / MLO'];
  [0,1].forEach(col=>{
    const colNodes=nodes.filter(n=>n.col===col); if(!colNodes.length) return;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',colNodes[0].x0+11); t.setAttribute('y',-10);
    t.setAttribute('text-anchor','middle'); t.setAttribute('fill','#484f58');
    t.setAttribute('font-size','10'); t.setAttribute('font-weight','600');
    t.setAttribute('font-family','Anuphan,Sarabun,sans-serif');
    t.textContent=colLabels[col]; g.appendChild(t);
  });

  const pathEls=[];
  links.forEach((l,li)=>{
    const gid='g'+Math.random().toString(36).slice(2,9);
    const makeGrad=(id,a1,a2)=>{
      const gr=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
      gr.setAttribute('id',id); gr.setAttribute('gradientUnits','userSpaceOnUse');
      gr.setAttribute('x1',l.src.x1); gr.setAttribute('x2',l.tgt.x0);
      const c=l.color||'#58a6ff';
      const s1=document.createElementNS('http://www.w3.org/2000/svg','stop');
      s1.setAttribute('offset','0%'); s1.setAttribute('stop-color',toRgba(c,a1));
      const s2=document.createElementNS('http://www.w3.org/2000/svg','stop');
      s2.setAttribute('offset','100%'); s2.setAttribute('stop-color',toRgba(c,a2));
      gr.appendChild(s1); gr.appendChild(s2); defs.appendChild(gr);
    };
    makeGrad(gid,0.55,0.18);
    makeGrad('h'+gid,0.92,0.75);
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',bandPath(l));
    path.setAttribute('fill',`url(#${gid})`);
    path.style.transition='fill .15s, opacity .15s'; path.style.cursor='pointer';
    path._normalFill=`url(#${gid})`; path._highlightFill=`url(#h${gid})`; path._link=l; path._idx=li;
    const lvLabel={I:'Introductory',R:'Reinforce',M:'Mastery'};
    path.addEventListener('click',e=>{
      e.stopPropagation();
      if(activeLink===li){ activeLink=null; pathEls.forEach(p=>{p.style.opacity='1';p.setAttribute('fill',p._normalFill);}); hideTip(); }
      else {
        activeLink=li;
        pathEls.forEach((p,pi)=>{
          if(pi===li){p.style.opacity='1';p.setAttribute('fill',p._highlightFill);p.parentNode.appendChild(p);}
          else{p.style.opacity='0.08';p.setAttribute('fill',p._normalFill);}
        });
        showTip(e,`<div class="tt-h">${l.src.label} → ${l.tgt.label}</div><div class="tt-s">ระดับ: <span class="tt-v">${lvLabel[l.lv]||'—'}</span></div>`);
      }
    });
    path.addEventListener('mouseover',e=>{ if(activeLink!==null) return; path.setAttribute('fill',path._highlightFill); showTip(e,`<div class="tt-h">${l.src.label} → ${l.tgt.label}</div><div class="tt-s">ระดับ: <span class="tt-v">${lvLabel[l.lv]||'—'}</span></div>`); });
    path.addEventListener('mousemove',moveTip);
    path.addEventListener('mouseout',e=>{ if(activeLink!==null) return; path.setAttribute('fill',path._normalFill); hideTip(); });
    pathEls.push(path); g.appendChild(path);
  });

  svg.addEventListener('click',()=>{ if(activeLink!==null){ activeLink=null; pathEls.forEach(p=>{p.style.opacity='1';p.setAttribute('fill',p._normalFill);}); hideTip(); } });

  nodes.forEach(n=>{
    const ng=document.createElementNS('http://www.w3.org/2000/svg','g');
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',n.x0); rect.setAttribute('y',n.y0);
    rect.setAttribute('width',n.x1-n.x0); rect.setAttribute('height',Math.max(n.h,2));
    rect.setAttribute('fill',n.color||'#484f58'); rect.setAttribute('rx','3');
    rect.setAttribute('stroke',toRgba(n.color||'#58a6ff',0.5)); rect.setAttribute('stroke-width','0.5');
    rect.addEventListener('mouseover',e=>{
      if(n.kind==='course'){
        const ploList=Object.entries(n.map||{}).map(([k,v])=>`<span style="opacity:.85">${k.replace('_','.')} <span class="tt-v">${v}</span></span>`).join(' · ');
        showTip(e,`<div class="tt-h">${n.label}</div><div class="tt-s" style="font-size:.85rem;color:#c9d1d9;margin-bottom:.3rem">${n.fullname||''}</div><div class="tt-s">${ploList}</div>`);
      } else {
        showTip(e,`<div class="tt-h">${n.label}</div><div class="tt-s">${n.full||''}</div><div class="tt-s" style="margin-top:.2rem">รวม ${Math.round(n.v)} การเชื่อมโยง</div>`);
      }
    });
    rect.addEventListener('mousemove',moveTip);
    rect.addEventListener('mouseout',hideTip);
    ng.appendChild(rect);
    const cy=n.y0+n.h/2, isLeft=n.col===0;
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('y',cy); lbl.setAttribute('dy','0.35em');
    lbl.setAttribute('font-size','11'); lbl.setAttribute('pointer-events','none');
    if(isLeft){ lbl.setAttribute('x',n.x0-8); lbl.setAttribute('text-anchor','end'); lbl.setAttribute('fill','#c9d1d9'); }
    else { lbl.setAttribute('x',n.x1+8); lbl.setAttribute('text-anchor','start'); lbl.setAttribute('fill','#8b949e'); }
    const txt=n.label; lbl.textContent=txt.length>26?txt.slice(0,26)+'…':txt;
    ng.appendChild(lbl); g.appendChild(ng);
  });
}

const TT=document.getElementById('tt');
function showTip(e,html){TT.innerHTML=html;TT.style.opacity='1';TT.style.left=(e.clientX+14)+'px';TT.style.top=(e.clientY-10)+'px';}
function moveTip(e){TT.style.left=(e.clientX+14)+'px';TT.style.top=(e.clientY-10)+'px';}
function hideTip(){TT.style.opacity='0';}

function onPloTypeChange(){
  selectedPloIds.clear();
  buildPloChecklist();
  render();
}

// init
buildPloChecklist();
render();
window.addEventListener('resize',render);
