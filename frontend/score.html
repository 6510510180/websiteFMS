<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คะแนนผลลัพธ์ | FMS</title>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700;800;900&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --pu:#9b51e0;--pu2:#7b2cbf;--pu-m:#E8DEFF;--pu-tab:#EDE9FE;--pu-sec:#F0EBFF;
  --bg:#EEEEF6;--wh:#fff;--tx:#1A1523;--ts:#64748B;--bd:#E2E8F0;
  --green:#059669;--amber:#d97706;--red:#dc2626;--blue:#3B82F6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;}

.main-content{padding:28px 0 80px;min-height:100vh;}
.container{width:92%;max-width:1300px;margin:0 auto;}
.header-banner{background:var(--pu-m);border-radius:14px;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
.header-title{font-size:17px;font-weight:700;color:var(--tx);}
.header-sub{font-size:12px;color:var(--ts);margin-top:3px;}
.hbtns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--bd);font-family:inherit;transition:.15s;text-decoration:none;white-space:nowrap;background:var(--wh);color:#444;}
.btn:hover{border-color:var(--pu2);color:var(--pu2);}
.btn-purple{background:var(--pu2);color:#fff;border-color:var(--pu2);}
.btn-purple:hover{background:#6d28d9;color:#fff;}
select.btn{cursor:pointer;}
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.tab-btn{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;background:var(--wh);color:#555;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--bd);text-decoration:none;transition:.15s;}
.tab-btn:hover{border-color:var(--pu);color:var(--pu);}
.tab-btn.active{background:var(--pu-tab);color:var(--pu2);border-color:var(--pu-m);font-weight:700;}
.dashboard-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:start;}
.card{background:var(--wh);border-radius:14px;border:1px solid rgba(0,0,0,.05);box-shadow:0 2px 10px rgba(0,0,0,.04);overflow:hidden;margin-bottom:16px;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--bd);}
.card-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;}
.scale-badge{background:#EFF6FF;color:var(--blue);padding:3px 12px;border-radius:99px;font-size:11px;font-weight:600;}

/* ━━━ TABLE ━━━ */
.tbl-wrap{overflow-x:auto;}
table.mt{width:100%;border-collapse:collapse;font-size:13.5px;}
table.mt colgroup col:first-child{width:54%;}
table.mt colgroup col{width:15%;}
table.mt th{background:#faf7ff;color:var(--ts);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:11px 16px;border-bottom:2px solid #ede8f5;white-space:nowrap;}
table.mt th.left{text-align:left;}
table.mt th.ctr{text-align:center;}
table.mt td{padding:11px 16px;border-bottom:1px solid #f3eeff;vertical-align:middle;}
table.mt td.num{text-align:center;}

/* ── ภาควิชา (dept) ── */
table.mt tr.r-dept > td{background:#3c3489;color:#EEEDFE;font-weight:700;font-size:13px;letter-spacing:.3px;border-bottom:none;}

/* ── กลุ่มวิชา (group) ── */
table.mt tr.r-group > td{background:#6d28d9;color:#DDD6FE;font-weight:700;font-size:13px;border-bottom:none;}

/* ── section header ── */
table.mt tr.r-sec > td{background:var(--pu-sec);color:var(--pu2);font-weight:700;font-size:13px;padding:10px 16px;border-bottom:1px solid #ddd6fe;}

/* ── subtotal ── */
table.mt tr.r-sub > td{background:#7c3aed;color:#fff;font-weight:700;font-size:13.5px;border-bottom:none;}

/* ── dept total ── */
table.mt tr.r-dtot > td{background:#2d1b4e;color:#C4B5FD;font-weight:700;font-size:13.5px;border-bottom:none;}

/* ── grand total ── */
table.mt tr.r-grand > td{background:var(--pu-m);color:var(--pu2);font-weight:700;font-size:14px;border-top:2px solid #c4b5fd;border-bottom:none;}

.i1{padding-left:18px!important;}
.i2{padding-left:32px!important;}
.i3{padding-left:46px!important;}
.sg{color:var(--green);font-weight:700;}
.sa{color:var(--amber);font-weight:700;}
.sr{color:var(--red);font-weight:700;}
.sd{color:#bbb;}
.lo-code{font-size:10.5px;color:var(--ts);display:block;margin-bottom:2px;font-weight:600;}
.bp{display:inline-block;font-size:10px;padding:1px 7px;border-radius:99px;background:#EDE9FE;color:#6d28d9;font-weight:700;margin-right:5px;vertical-align:middle;}
.bm{display:inline-block;font-size:10px;padding:1px 7px;border-radius:99px;background:#D1FAE5;color:#065F46;font-weight:700;margin-right:5px;vertical-align:middle;}

/* ── Sidebar ── */
.side-card{background:var(--wh);border-radius:14px;border:1px solid rgba(0,0,0,.05);box-shadow:0 2px 10px rgba(0,0,0,.04);padding:18px;margin-bottom:16px;}
.side-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--tx);}
.prog-group{margin-bottom:14px;}
.prog-label{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;}
.prog-val{color:var(--ts);font-size:12px;}
.prog-bar{background:#F0ECF8;height:8px;border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:10px;background:var(--pu2);}
.stat-grid{display:flex;justify-content:space-around;align-items:center;padding-top:16px;margin-top:8px;text-align:center;border-top:1px solid var(--bd);}
.stat-div{width:1px;height:38px;background:var(--bd);}
.stat-val{font-size:28px;font-weight:700;line-height:1;}
.stat-lbl{font-size:10px;color:var(--ts);margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.adv{display:flex;gap:10px;margin-top:10px;font-size:12.5px;padding:11px 13px;border-radius:10px;line-height:1.5;align-items:flex-start;}
.adv i{margin-top:2px;flex-shrink:0;}
.adv.ok{background:#F0FFF4;color:#15803D;}
.adv.warn{background:#FFFBEB;color:#92400E;}
.adv.info{background:#EFF6FF;color:#1e40af;}
.st{text-align:center;padding:60px 24px;color:var(--ts);}
.st i{font-size:32px;display:block;margin-bottom:12px;}
.st.loading i{color:var(--pu);animation:spin 1s linear infinite;}
.st.err i{color:var(--red);}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.dashboard-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>


<main class="main-content">
<div class="container">

  <div class="header-banner">
    <div>
      <div class="header-title" id="pageTitle">สรุปจากระบบการประเมินผลการเรียนรู้และการทวนสอบผลสัมฤทธิ์ของนักศึกษา</div>
      <div class="header-sub" id="pageSub">กำลังโหลดข้อมูล...</div>
    </div>
    <div class="hbtns">
      <select id="yearSel" class="btn" onchange="onYear(this.value)"></select>
      <button class="btn" onclick="exportExcel()"><i class="fas fa-file-export"></i> ส่งออก Excel</button>
    </div>
  </div>

  <div class="tabs">
    <a href="bba-plo.html"     class="tab-btn"><i class="fas fa-th-large"></i> PLOs/MLOs</a>
    <a href="score.html"       class="tab-btn active"><i class="fas fa-chart-bar"></i> คะแนนผลลัพธ์</a>
    <a href="bba-matrix1.html" class="tab-btn"><i class="fas fa-project-diagram"></i> Alignment Matrix</a>
    <a href="kas1.html"        class="tab-btn"><i class="fas fa-book"></i> KAS</a>
  </div>

  <div class="dashboard-grid">
    <section>
      <div class="card">
        <div class="card-head">
          <div class="card-title">
            <i class="fas fa-table" style="color:var(--pu2)"></i>
            ตารางสรุปคะแนนเฉลี่ยตาม PLO/MLO
          </div>
          <span class="scale-badge">Average Scale 1.0–5.0</span>
        </div>
        <div id="tableWrap">
          <div class="st loading"><i class="fas fa-spinner"></i><p>กำลังโหลดข้อมูล...</p></div>
        </div>
      </div>
    </section>

    <aside>
      <div class="side-card">
        <div class="side-title"><i class="fas fa-chart-column" style="color:var(--pu2)"></i> เปรียบเทียบคะแนนรวมแต่ละด้าน</div>
        <div id="compareSection"></div>
        <div class="stat-grid" id="statGrid"></div>
      </div>
      <div class="side-card">
        <div class="side-title"><i class="far fa-lightbulb" style="color:var(--amber)"></i> สรุปข้อเสนอแนะ</div>
        <div id="adviceSection"></div>
      </div>
    </aside>
  </div>

</div>
</main>

<script>
const API_BASE   = '/api/plo';
const PROGRAM_ID = '00000000-0000-0000-0000-000000000001';
let YEAR = '';
let DATA = [];

function avg(a){ const v=a.filter(x=>x!==null&&x!==undefined&&!isNaN(x)); return v.length?v.reduce((s,x)=>s+x,0)/v.length:null; }
function grd(r){ return avg([r.sem1,r.sem2].filter(x=>x!==null)); }
function fmt(v){
  if(v===null||v===undefined) return '<span class="sd">—</span>';
  const c=v>=4.5?'sg':v>=4.0?'sa':'sr';
  return `<span class="${c}">${v.toFixed(2)}</span>`;
}

async function initYears(){
  let years=[];
  try{
    const r=await fetch(`${API_BASE}/available-years?program_id=${PROGRAM_ID}`);
    const j=await r.json();
    years=j.years&&j.years.length?j.years:fallback();
  }catch{ years=fallback(); }
  const sel=document.getElementById('yearSel');
  sel.innerHTML=years.map(y=>`<option value="${y}">ปีการศึกษา ${y}</option>`).join('');
  YEAR=String(years[0]); sel.value=YEAR;
  await loadData();
}
function fallback(){ const n=new Date().getFullYear()+543; return [n,n-1,n-2,n-3,n-4]; }
async function onYear(v){ if(!v)return; YEAR=v; await loadData(); }

async function loadData(){
  document.getElementById('tableWrap').innerHTML='<div class="st loading"><i class="fas fa-spinner"></i><p>กำลังโหลดข้อมูล...</p></div>';
  document.getElementById('pageTitle').textContent='สรุปจากระบบการประเมินผลการเรียนรู้และการทวนสอบผลสัมฤทธิ์ของนักศึกษา ปีการศึกษา '+YEAR;
  document.getElementById('pageSub').textContent='ข้อมูลจากระบบ FMS | ปีการศึกษา '+YEAR;
  try{
    const r=await fetch(`${API_BASE}/scores?year=${YEAR}&program_id=${PROGRAM_ID}`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(!j.success) throw new Error(j.message||'error');
    DATA=j.data||[];
    render();
    renderSidebar();
  }catch(e){
    document.getElementById('tableWrap').innerHTML=
      `<div class="st err"><i class="fas fa-exclamation-circle"></i>
       <p>โหลดข้อมูลไม่สำเร็จ: ${e.message}</p>
       <p style="margin-top:8px;font-size:12px">กรุณา <a href="score-plo.html" style="color:var(--pu2)">กรอกข้อมูลในหน้าคะแนน PLO</a> ก่อน</p></div>`;
  }
}

/* ━━━ RENDER ━━━
   โครงสร้างตรงตามที่ต้องการ:
   ภาควิชา (dept, darkest)
     กลุ่มวิชา (group, dark purple)
       section header (purple tint)
         data rows (white)
       subtotal (solid purple)
   deptTotal (darkest)
   grand (light purple)
*/
function render(){
  if(!DATA.length){
    document.getElementById('tableWrap').innerHTML=
      `<div class="st"><i class="fas fa-inbox" style="color:#c4b5fd"></i>
       <p>ยังไม่มีข้อมูลคะแนน</p>
       <p style="margin-top:8px;font-size:12px"><a href="score-plo.html" style="color:var(--pu2)">กรอกข้อมูลในหน้าคะแนน PLO</a></p></div>`;
    return;
  }

  let html='';

  DATA.forEach(item=>{
    if(item.type==='dept'){
      /* ภาควิชา — darkest purple, full width */
      html+=`<tr class="r-dept"><td colspan="4">${item.label||''}</td></tr>`;

    } else if(item.type==='group'){
      /* กลุ่มวิชา — dark purple */
      html+=`<tr class="r-group"><td colspan="4" class="i1">${item.label||''}</td></tr>`;

    } else if(item.type==='section'){
      /* หัวข้อหมวด — purple tint */
      html+=`<tr class="r-sec"><td colspan="4" class="i2">${item.label||''}</td></tr>`;

    } else if(item.type==='row'){
      /* data row — white bg, read-only numbers */
      const g=grd(item);
      const badge=item.level==='MLO'?`<span class="bm">MLO</span>`:
                  item.level==='PLO'?`<span class="bp">PLO</span>`:'';
      const codeEl=item.code?`<span class="lo-code">${item.code}</span>`:'';
      html+=`<tr>
        <td class="i3">${codeEl}${badge}${item.desc||item.code||''}</td>
        <td class="num">${fmt(item.sem1)}</td>
        <td class="num">${fmt(item.sem2)}</td>
        <td class="num" style="font-size:15px">${fmt(g)}</td>
      </tr>`;

    } else if(item.type==='subtotal'){
      /* รวมกลุ่ม — solid purple */
      const s1=item.sem1??null, s2=item.sem2??null;
      const g=item.grand??avg([s1,s2].filter(x=>x!==null));
      html+=`<tr class="r-sub">
        <td class="i2"><strong>${item.label||''}</strong></td>
        <td class="num">${fmt(s1)}</td>
        <td class="num">${fmt(s2)}</td>
        <td class="num">${fmt(g)}</td>
      </tr>`;

    } else if(item.type==='deptTotal'){
      /* รวมภาควิชา — darkest */
      const s1=item.sem1??null, s2=item.sem2??null;
      const g=item.grand??avg([s1,s2].filter(x=>x!==null));
      html+=`<tr class="r-dtot">
        <td><strong>${item.label||''}</strong></td>
        <td class="num">${fmt(s1)}</td>
        <td class="num">${fmt(s2)}</td>
        <td class="num">${fmt(g)}</td>
      </tr>`;

    } else if(item.type==='grand'){
      /* Grand Total — light purple */
      const s1=item.sem1??null, s2=item.sem2??null;
      const g=item.grand??avg([s1,s2].filter(x=>x!==null));
      html+=`<tr class="r-grand">
        <td><strong>${item.label||'Grand Total'}</strong></td>
        <td class="num">${fmt(s1)}</td>
        <td class="num">${fmt(s2)}</td>
        <td class="num">${fmt(g)}</td>
      </tr>`;
    }
  });

  document.getElementById('tableWrap').innerHTML=`
    <div class="tbl-wrap">
      <table class="mt">
        <colgroup><col><col><col><col></colgroup>
        <thead><tr>
          <th class="left">ผลลัพธ์การเรียนรู้ (Learning Outcomes)</th>
          <th class="ctr">SEM 1</th>
          <th class="ctr">SEM 2</th>
          <th class="ctr">Grand Total</th>
        </tr></thead>
        <tbody>${html}</tbody>
      </table>
    </div>`;
}

function renderSidebar(){
  const rows=DATA.filter(r=>r.type==='row');
  const groups=[...new Set(rows.map(r=>r.group).filter(Boolean))];

  document.getElementById('compareSection').innerHTML=groups.slice(0,4).map(g=>{
    const gv=avg(rows.filter(r=>r.group===g).map(r=>grd(r)).filter(v=>v!==null));
    return `<div class="prog-group">
      <div class="prog-label"><span>${g}</span><span class="prog-val">${gv!==null?gv.toFixed(2)+' / 5.0':'—'}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${gv?((gv/5)*100).toFixed(1):0}%"></div></div>
    </div>`;
  }).join('');

  const gt=DATA.find(r=>r.type==='grand');
  const overall=gt?.grand??avg(rows.map(r=>grd(r)).filter(v=>v!==null));
  const pct=overall?Math.round((overall/5)*100):0;
  const pc=pct>=90?'var(--green)':pct>=80?'var(--amber)':'var(--red)';
  document.getElementById('statGrid').innerHTML=`
    <div><div class="stat-val" style="color:${pc}">${pct}%</div><div class="stat-lbl">Target Achieved</div></div>
    <div class="stat-div"></div>
    <div><div class="stat-val" style="color:var(--pu2)">${overall!==null?overall.toFixed(2):'—'}</div><div class="stat-lbl">Overall Avg</div></div>`;

  const low=rows.filter(r=>{const g=grd(r);return g!==null&&g<4.33;});
  const high=rows.filter(r=>{const g=grd(r);return g!==null&&g>=4.8;});
  let adv='';
  if(high.length) adv+=`<div class="adv ok"><i class="fas fa-check-circle"></i><span>${high.slice(0,4).map(r=>r.code||r.desc).join(', ')} มีคะแนนดีเลิศ (≥ 4.80)</span></div>`;
  if(low.length)  adv+=`<div class="adv warn"><i class="fas fa-exclamation-circle"></i><span>${low.slice(0,4).map(r=>r.code||r.desc).join(', ')} มีคะแนนต่ำกว่าเกณฑ์ (< 4.33) ควรจัดทำแผนพัฒนา</span></div>`;
  if(!adv) adv=`<div class="adv ok"><i class="fas fa-check-circle"></i><span>ทุก PLO/MLO ผ่านเกณฑ์ขั้นต่ำที่กำหนด</span></div>`;
  adv+=`<div class="adv info"><i class="fas fa-info-circle"></i><span>ดำเนินการทวนสอบครบถ้วนทุกรายวิชา — AUN-QA มาตรฐานสากล</span></div>`;
  document.getElementById('adviceSection').innerHTML=adv;
}

function exportExcel(){
  if(!window.XLSX){alert('กำลังโหลด...'); return;}
  const hdr=['ประเภท','รหัส','คำอธิบาย','SEM 1','SEM 2','Grand Total'];
  const body=[];
  DATA.forEach(item=>{
    if(item.type==='row'){
      const g=grd(item);
      body.push([item.level||'',item.code||'',item.desc||'',item.sem1??'',item.sem2??'',g!==null?+g.toFixed(2):'']);
    } else if(['section','group','dept','subtotal','deptTotal','grand'].includes(item.type)){
      body.push(['','',item.label||'','','','']);
    }
  });
  const ws=XLSX.utils.aoa_to_sheet([hdr,...body]);
  ws['!cols']=[{wch:8},{wch:30},{wch:60},{wch:10},{wch:10},{wch:12}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'PLO Score Report');
  XLSX.writeFile(wb,`plo_score_report_${YEAR}.xlsx`);
}

initYears();
</script>
<script src="navbar.js"></script>
</body>
</html>
