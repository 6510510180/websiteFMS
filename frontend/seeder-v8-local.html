<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#0f0a1e,#1a0a2e,#0d1a2e);display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:860px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:32px}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.ico{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:26px}
h1{color:#fff;font-size:20px;font-weight:800}.sub{color:#94a3b8;font-size:12px;margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px;text-align:center}
.sv{color:#e2e8f0;font-weight:800;font-size:16px}.ss{color:#64748b;font-size:11px;margin-top:2px}
.pw{margin-bottom:14px}.pl{display:flex;justify-content:space-between;color:#94a3b8;font-size:12px;margin-bottom:5px}
.pb{background:rgba(255,255,255,0.1);border-radius:8px;height:8px;overflow:hidden}
.pf{height:100%;border-radius:8px;background:linear-gradient(90deg,#7c3aed,#3b82f6);transition:width 0.4s}
button{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px}
button:disabled{opacity:0.45;cursor:not-allowed}
.done{background:rgba(134,239,172,0.1);border:1px solid rgba(134,239,172,0.3);border-radius:12px;padding:14px;text-align:center;color:#86efac;font-weight:700;margin-bottom:14px;font-size:14px}
.log{background:#06060c;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;max-height:460px;overflow-y:auto;font-family:monospace;font-size:11.5px;line-height:1.8}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.sp{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>

// group subjects by year → term
function groupByYearThenTerm(subjects){
  // returns { '1': { '1':[...], '2':[...] }, '2': {...}, ... }
  const byYear={};
  for(const s of subjects){
    if(!byYear[s.year]) byYear[s.year]={};
    if(!byYear[s.year][s.term]) byYear[s.year][s.term]=[];
    byYear[s.year][s.term].push(s);
  }
  return byYear;
}

async function post(url,body){
  const r=await fetch(API+url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await r.json().catch(()=>({}));
  return{ok:r.ok,status:r.status,data};
}

// subject cache: code → subject_id
let subCache={};

async function loadSubjectCache(){
  log('🔄 โหลด subjects ที่มีอยู่แล้ว...','dim');
  try{
    const r=await fetch(API+'/subjects?pageSize=2000');
    const data=await r.json();
    const list=Array.isArray(data)?data:(data.data||data.subjects||[]);
    for(const s of list) subCache[s.code]=s.id;
    log('  ✅ cache '+list.length+' วิชา','ok');
  }catch(e){log('  ⚠️ cache fail: '+e.message,'warn');}
}

// ดึง existing semesters ของ plan แล้ว return map: "yearNo_termNo" → semId
// แก้ bug v6: key ด้วย year_no+term_no คู่กัน ไม่ใช่แค่ term_no
async function getExistingSemesters(planId){
  try{
    const r=await fetch(API+'/study-plans/'+planId);
    const d=await r.json();
    const map={};
    for(const s of (d.semesters||[])){
      // รองรับทั้ง year_no ที่มีหรือไม่มี
      const yn=s.year_no!=null?+s.year_no:'?';
      const tn=+s.term_no;
      map[yn+'_'+tn]=s.id;
      // fallback: ถ้า API ไม่คืน year_no ให้ map term_no อย่างเดียวด้วย (backward compat)
      if(!map['_'+tn]) map['_'+tn]=s.id;
    }
    return map;
  }catch(e){ return {}; }
}

// getOrCreate semester — เช็คด้วย key "yearNo_termNo"
async function getOrCreateSemester(planId,termNo,title,yearNo,existingMap){
  const key=yearNo+'_'+termNo;
  if(existingMap[key]){
    log('      ♻️ year '+yearNo+' term '+termNo+' มีอยู่แล้ว semId:'+existingMap[key],'dim');
    return existingMap[key];
  }
  const sr=await post('/study-plans/'+planId+'/semesters',{
    term_no:termNo,title,year_no:yearNo,sort_order:termNo
  });
  if(sr.ok){
    const sid=sr.data.id||(sr.data.semester&&sr.data.semester.id);
    existingMap[key]=sid; // update cache ด้วย key ที่ถูกต้อง
    log('      ✅ สร้าง year '+yearNo+' term '+termNo+' semId:'+sid,'ok');
    return sid;
  }
  // ถ้า duplicate error (409 หรือ 500) → ลอง GET อีกครั้ง
  if(sr.status===409||sr.status===500){
    log('      ⚠️ อาจซ้ำ — ดึง semester ใหม่...','warn');
    try{
      const retry=await fetch(API+'/study-plans/'+planId);
      const rd=await retry.json();
      for(const s of (rd.semesters||[])){
        const yn=s.year_no!=null?+s.year_no:'?';
        if(yn===yearNo && +s.term_no===termNo){
          existingMap[key]=s.id;
          log('      ♻️ พบ semId:'+s.id+' (จาก retry)','dim');
          return s.id;
        }
      }
    }catch(e2){}
  }
  log('      ⚠️ สร้าง semester ไม่ได้: '+(sr.data.message||sr.status),'warn');
  return null;
}

async function addSubject(semId,s){
  const isXxx=s.code==='xxx-xxx';
  const credits=+s.credits||0;
  const hours=s.hours||null;

  if(!isXxx && subCache[s.code]){
    const r=await post('/semesters/'+semId+'/subjects',{
      subject_id:subCache[s.code],credits,hour_structure:hours,category:'Core'
    });
    if(r.ok) return{ok:true,reused:true};
    return{ok:false,msg:r.data.message||r.status};
  }

  const code=isXxx?('GE-'+Math.floor(Math.random()*900000+100000)):s.code;
  const r=await post('/semesters/'+semId+'/subjects',{
    code,name_th:s.name_th,credits,default_credits:credits,
    hour_structure:hours,default_hour_structure:hours,
    category:'Core',name_en:null,description_th:null,description_en:null,
  });
  if(r.ok){
    if(!isXxx){
      const newId=r.data.item?.subject_id||r.data.subject_id;
      if(newId) subCache[s.code]=newId;
    }
    return{ok:true,reused:false};
  }
  // 500 อาจ code ซ้ำ → ลอง query
  if(r.status===500&&!isXxx){
    try{
      const qr=await fetch(API+'/subjects?query='+encodeURIComponent(s.code));
      const qd=await qr.json();
      const list=Array.isArray(qd)?qd:(qd.data||[]);
      const found=list.find(x=>x.code===s.code);
      if(found){
        subCache[s.code]=found.id;
        const r2=await post('/semesters/'+semId+'/subjects',{
          subject_id:found.id,credits,hour_structure:hours,category:'Core'
        });
        if(r2.ok) return{ok:true,reused:true};
      }
    }catch(e2){}
  }
  return{ok:false,msg:r.data.message||r.status};
}

async function run(){
  btn.disabled=true;
  btn.innerHTML='<span class="sp">⟳</span> กำลังเพิ่มข้อมูล...';
  pw.style.display='block';logEl.innerHTML='';

  try{
    await loadSubjectCache();

    // STEP 1: COURSES
    log('━━━ STEP 1/3: สร้างหลักสูตร BBA ━━━','h');
    const courseMap={};
    const courseDefs=[
      {label:'2563',body:{name_th:'หลักสูตรบริหารธุรกิจบัณฑิต',name_en:'Bachelor of Business Administration',degree_level:'ปริญญาตรี',status:'active',program_type:'หลักสูตร 4 ปี',study_system:'ภาคปกติ',award_title:'บริหารธุรกิจบัณฑิต (บธ.บ.)',total_credits:129,student_range:'ปีหลักสูตร 2563',short_detail:'หลักสูตรบริหารธุรกิจบัณฑิต ปีหลักสูตร 2563'}},
      {label:'2567',body:{name_th:'หลักสูตรบริหารธุรกิจบัณฑิต',name_en:'Bachelor of Business Administration',degree_level:'ปริญญาตรี',status:'active',program_type:'หลักสูตร 4 ปี',study_system:'ภาคปกติ',award_title:'บริหารธุรกิจบัณฑิต (บธ.บ.)',total_credits:129,student_range:'ปีหลักสูตร 2567',short_detail:'หลักสูตรบริหารธุรกิจบัณฑิต ปีหลักสูตร 2567'}},
    ];
    for(const c of courseDefs){
      log('  ⏳ BBA '+c.label+'...');prog(2,'หลักสูตร '+c.label);
      const r=await post('/courses',c.body);
      if(!r.ok) throw new Error('หลักสูตร '+c.label+': '+r.data.message);
      const id=r.data.id||r.data.courseId||(r.data.course&&r.data.course.id);
      courseMap[c.label]=id;
      log('  ✅ BBA '+c.label+' → ID:'+id,'ok');
      await sleep(400);
    }

    // STEP 2: MAJORS
    log('━━━ STEP 2/3: สร้างสาขาวิชา 12 สาขา ━━━','h');
    const majorMap={};let mDone=0;
    for(const [yr,cid] of Object.entries(courseMap)){
      for(const key of KEYS){
        const inf=INFO[key];
        log('  ⏳ '+inf.name_th+' ('+yr+')...');
        prog(5+Math.round(mDone/12*18),'สาขา '+inf.name_th);
        const r=await post('/majors',{
          major_name_th:inf.name_th,major_name_en:inf.name_en,
          name_th:inf.name_th,name_en:inf.name_en,
          intro:inf.intro,course_id:cid,courseId:cid
        });
        if(!r.ok){log('  ⚠️ '+inf.name_th+': '+r.data.message,'warn');mDone++;continue;}
        const mid=r.data.id||r.data.majorId||(r.data.major&&r.data.major.id);
        majorMap[key+'_'+yr]=mid;
        log('  ✅ '+inf.name_th+' → ID:'+mid,'ok');
        mDone++;await sleep(200);
      }
    }

    // STEP 3: PLANS + SEMESTERS + SUBJECTS
    // KEY CHANGE: สร้าง study-plan แยกต่อปี (year_no 1,2,3,4)
    log('━━━ STEP 3/3: สร้างแผนการเรียน แยกต่อปี ━━━','h');
    const planEntries=Object.entries(PLANS);
    let pDone=0,subOk=0,subReused=0,subErr=0;

    for(const [planKey,subjects] of planEntries){
      const parts=planKey.split('_');
      const mKey=parts[0],yr=parts[1],pType=parts[2];
      const mid=majorMap[mKey+'_'+yr];
      if(!mid){log('⚠️ ข้าม '+planKey,'warn');pDone++;continue;}

      log('📘 '+planKey);
      prog(23+Math.round(pDone/planEntries.length*74),planKey);

      // group by year first
      const byYear=groupByYearThenTerm(subjects);

      for(const [yearNo,termMap] of Object.entries(byYear).sort((a,b)=>+a[0]-+b[0])){
        log('  📅 ปี '+yearNo+'...');

        // สร้าง study-plan แยกต่อปี
        const pr=await post('/majors/'+mid+'/study-plans',{
          academic_year:+yr,year_no:+yearNo,status:'active',plan_type:pType
        });
        if(!pr.ok){log('  ⚠️ plan ปี '+yearNo+': '+pr.data.message,'warn');continue;}
        const pid=pr.data.id||(pr.data.plan&&pr.data.plan.id)||(pr.data.study_plan&&pr.data.study_plan.id);
        log('  ✅ planId:'+pid+' (year_no:'+yearNo+')','ok');
        await sleep(120);

        // โหลด existing semesters ของ plan นี้
        const existingSems=await getExistingSemesters(pid);

        for(const [term,termSubjects] of Object.entries(termMap).sort((a,b)=>{
          const o={'1':1,'2':2,'summer':3};return(o[a[0]]||9)-(o[b[0]]||9);
        })){
          const termNo=term==='summer'?3:+term;
          const title='ปี '+yearNo+' - '+(TERM_LABELS[term]||term);

          const sid=await getOrCreateSemester(pid,termNo,title,+yearNo,existingSems);
          if(!sid) continue;
          await sleep(70);

          for(const s of termSubjects){
            const result=await addSubject(sid,s);
            if(result.ok){
              if(result.reused){log('        ♻️ '+s.code,'dim');subReused++;}
              else{log('        ✅ '+s.code+' '+s.name_th.substring(0,18),'ok');subOk++;}
            }else{
              log('        ❌ '+s.code+': '+result.msg,'err');subErr++;
            }
            await sleep(55);
          }
        }
      }
      pDone++;
    }

    prog(100,'เสร็จสมบูรณ์!');
    doneBox.style.display='block';btn.style.display='none';
    log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━','h');
    log('🎉 v7 เสร็จ! ใหม่: '+subOk+' | reuse: '+subReused+' | error: '+subErr,'ok');

  }catch(err){
    log('❌ ERROR: '+err.message,'err');
    btn.disabled=false;btn.innerHTML='🔄 ลองใหม่';
  }
}
