<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตารางผลลัพธ์การเรียนรู้ PLOs & MLOs × KAS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --pu:#6B3FA0;--pu-l:#F3EEFF;--pu-m:#E8DEFF;
  --kc:#3B82F6;--kl:#EFF6FF;--km:#DBEAFE;
  --ac:#F87171;--al:#FEF2F2;--am:#FEE2E2;
  --sc:#10B981;--sl:#ECFDF5;--sm:#D1FAE5;
  --bg:#252525;--wh:#fff;--tx:#1A1523;--ts:#64748B;--bd:#EDE8F5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Thai','Lexend',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* HEADER */
.ph{background:var(--wh);border-bottom:1px solid var(--bd);padding:16px 32px 12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(107,63,160,.06)}
.ht{font-family:'Lexend',sans-serif;font-size:16.5px;font-weight:800;line-height:1.35}
.hs{font-size:12px;color:var(--ts);margin-top:2px}
.hr{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:11px}

.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* View toggle: only PLO/MLO now */
.sg{display:flex;background:var(--bg);border:1.5px solid var(--bd);border-radius:9px;overflow:hidden}
.sb{padding:6px 18px;border:none;background:transparent;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ts);transition:all .15s}
.sb:not(:last-child){border-right:1px solid var(--bd)}
.sb.on{background:var(--pu);color:#fff}
.sb:not(.on):hover{background:var(--pu-l);color:var(--pu)}

/* Major dropdown */
.mdd-wrap{position:relative;display:inline-flex;align-items:center}
.mdd{appearance:none;-webkit-appearance:none;background:var(--bg);border:1.5px solid var(--bd);border-radius:9px;padding:6px 34px 6px 13px;font-size:13px;font-weight:700;font-family:inherit;color:var(--pu);cursor:pointer;outline:none;transition:border-color .15s,background .15s}
.mdd:hover,.mdd:focus{border-color:var(--pu);background:var(--pu-l)}
.mdd-arrow{position:absolute;right:10px;pointer-events:none;color:var(--pu);font-size:11px}

.lg{display:flex;align-items:center;gap:12px;font-size:11.5px;color:var(--ts)}
.li{display:flex;align-items:center;gap:5px;font-weight:600}
.ld{width:9px;height:9px;border-radius:3px;flex-shrink:0}

/* MAIN */
.mn{padding:20px 32px}
.tw{background:var(--wh);border:1px solid var(--bd);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.ts{overflow-x:auto}

table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg);border-bottom:2px solid var(--bd)}
thead th{padding:10px 14px;font-size:10.5px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;text-align:left}
th.tk{color:var(--kc)}th.ta{color:var(--ac)}th.ts2{color:var(--sc)}
th.tn{text-align:center;width:44px}
.ci{width:86px}.cn{min-width:230px}.ck{min-width:175px}

tbody tr{border-bottom:1px solid var(--bd);transition:background .1s;animation:fu .2s ease both}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#FAFAFE}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.sr td{padding:8px 14px;font-size:10.5px;font-weight:700;color:var(--pu);text-transform:uppercase;letter-spacing:1px;background:var(--pu-l);border-top:1px solid var(--pu-m);border-bottom:1px solid var(--pu-m)}

td.di{padding:11px 14px}
.ip{display:inline-flex;align-items:center;justify-content:center;padding:4px 10px;border-radius:999px;font-family:'Lexend',sans-serif;font-size:12.5px;font-weight:800;white-space:nowrap;background:var(--pu-l);color:var(--pu)}
.ip.ml{background:var(--pu-m);font-size:11.5px}

td.dn{padding:11px 14px;font-size:12.5px;font-weight:500;line-height:1.55}
td.dc{text-align:center;padding:11px 8px;font-family:'Lexend',sans-serif;font-size:13px;font-weight:700}
td.dc.z{color:#CBD5E1;font-weight:400}
td.dk{padding:9px 14px;vertical-align:middle}

.bs{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.b{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-family:'Lexend',sans-serif;font-size:11.5px;font-weight:700;cursor:default;white-space:nowrap;transition:transform .1s,box-shadow .1s}
.b:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,.13)}
.bk{background:var(--km);color:var(--kc)}
.ba{background:var(--am);color:var(--ac)}
.bs2{background:var(--sm);color:var(--sc)}
.be{font-size:12px;color:#CBD5E1;padding:3px 0}

/* Major badge tag */
.major-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;font-family:'Lexend',sans-serif;letter-spacing:.5px;margin-right:6px;vertical-align:middle}

.tf{padding:9px 14px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--ts)}

/* TOOLTIP */
.tip{visibility:hidden;opacity:0;position:fixed;z-index:9999;background:#1A1523;color:#fff;padding:10px 13px;border-radius:11px;font-size:12px;line-height:1.5;max-width:270px;pointer-events:none;transition:opacity .15s,visibility .15s;box-shadow:0 12px 32px rgba(0,0,0,.28)}
.tip::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border-width:6px 6px 0;border-style:solid;border-color:#1A1523 transparent transparent}
.tip.up::after{bottom:auto;top:-6px;border-width:0 6px 6px;border-color:transparent transparent #1A1523}
.tt{font-family:'Lexend',sans-serif;font-weight:800;font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.td2{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.td3{font-size:11.5px;color:rgba(255,255,255,.72);margin-bottom:5px;line-height:1.55}
.tdv{height:1px;background:rgba(255,255,255,.1);margin:5px 0}
.tr2{display:flex;justify-content:space-between;gap:12px;font-size:11px;margin-top:3px}
.tl{color:rgba(255,255,255,.5)}.tv{font-weight:700}
</style>
</head>
<body>

<div class="ph">
  <div class="ht">ตารางแสดงผลลัพธ์การเรียนรู้ระดับหลักสูตรและระดับวิชาเอก (PLOs &amp; MLOs) กับ Knowledge / Attitude / Skill</div>
  <div class="hs">หลักสูตรบริหารธุรกิจบัณฑิต (ฉบับปรับปรุง พ.ศ. 2567) · AUN-QA VERSION 4.0</div>
  <div class="hr">
    <div class="controls">
      <div class="sg">
        <button class="sb on" id="sPLO" onclick="sw('PLO')">PLOs</button>
        <button class="sb" id="sMLO" onclick="sw('MLO')">MLOs</button>
      </div>
      <div class="mdd-wrap" id="mddWrap" style="display:none">
        <select class="mdd" id="majorDd" onchange="onMajorChange()">
          <option value="ALL">— ทุกวิชาเอก —</option>
          <option value="FIN">FIN · การเงิน</option>
          <option value="MTK">MTK · การตลาด</option>
          <option value="HRM">HRM · การจัดการทรัพยากรมนุษย์</option>
          <option value="LMS">LMS · โลจิสติกส์และโซ่อุปทาน</option>
          <option value="BIS">BIS · ระบบสารสนเทศทางธุรกิจ</option>
          <option value="MICE">MICE · ธุรกิจไมซ์</option>
        </select>
        <span class="mdd-arrow">▾</span>
      </div>
    </div>
    <div class="lg">
      <div class="li"><div class="ld" style="background:#3B82F6"></div>Knowledge (K)</div>
      <div class="li"><div class="ld" style="background:#F87171"></div>Attitude (A)</div>
      <div class="li"><div class="ld" style="background:#10B981"></div>Skill (S)</div>
      <span>— Hover badges for details</span>
    </div>
  </div>
</div>

<div class="mn">
  <div class="tw">
    <div class="ts">
      <table>
        <thead id="th"></thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
    <div class="tf">
      <span id="fl">-</span>
      <span>ภาคผนวก ข · AUN-QA Version 4.0</span>
    </div>
  </div>
</div>

<div class="tip" id="tip"></div>
<script>

function buildRev(){
  const r={K:{},A:{},S:{}};
  for(const[id,row]of Object.entries(D)){
    for(const t of['K','A','S']){
      for(const code of Object.keys(row[t])){
        if(!r[t][code])r[t][code]={p:[],m:[]};
        if(id.startsWith('PLO'))r[t][code].p.push(id);
        else r[t][code].m.push(id);
      }
    }
  }
  return r;
}

let CV='PLO';
let selectedMajor='ALL';

function sw(v){
  CV=v;
  document.getElementById('sPLO').classList.toggle('on',v==='PLO');

function rMLO(){
  // filter by major
  let keys = MK;
  if(selectedMajor!=='ALL'){
    keys=MK.filter(k=>D[k].major===selectedMajor);
  }

  document.getElementById('th').innerHTML=`<tr>
    <th class="ci">รหัส</th><th class="cn">ผลลัพธ์การเรียนรู้</th>

  let h='';

  const majorOrder=['FIN','MTK','HRM','LMS','BIS','MICE'];
  const majorsToShow = selectedMajor==='ALL' ? majorOrder : [selectedMajor];

  majorsToShow.forEach(maj=>{
    const grp=keys.filter(k=>D[k].major===maj);
    if(!grp.length) return;
    const mc=MAJORS[maj];
    h+=`<tr class="sr"><td colspan="8" style="color:${mc.color}">
      <span style="background:${mc.bg};color:${mc.color};padding:2px 10px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:.8px;margin-right:8px">${maj}</span>

    </td></tr>`;
    grp.forEach((id,i)=>{h+=bRow(id,D[id],i,'MLO');});

  document.getElementById('tb').innerHTML=h;
  const count=keys.length;
  document.getElementById('fl').textContent=`Showing ${count} MLOs${selectedMajor!=='ALL'?' · '+MAJORS[selectedMajor].label:''}`;
}

    <td class="dc${sc.length===0?' z':''}">${sc.length||'—'}</td>
    <td class="dk"><div class="bs">${mkB(row.K,'K')}</div></td>
    <td class="dk"><div class="bs">${mkB(row.A,'A')}</div></td>
    <td class="dk"><div class="bs">${mkB(row.S,'S')}</div></td>
  </tr>`;
}

function mkB(obj,type){
  const codes=Object.keys(obj);
  if(!codes.length)return`<span class="be">—</span>`;
  return codes.map(code=>{
    const desc=obj[code];
    const rv=REV[type][code]||{p:[],m:[]};
    return`<span class="b ${TC[type].cl}"
      data-code="${code}" data-type="${type}"
      data-desc="${desc.replace(/"/g,'&quot;')}"
      data-plo="${rv.p.length}" data-mlo="${rv.m.length}"
      onmouseenter="sT(event,this)" onmouseleave="hT()"
    >${code}</span>`;
  }).join('');
}

const tipEl=document.getElementById('tip');
let tT=null;
function sT(e,el){
  clearTimeout(tT);
  const{code,type,desc,plo,mlo}=el.dataset;
  const cfg=TC[type],tot=(+plo)+(+mlo);
  tipEl.innerHTML=`
    <div class="tt"><div class="td2" style="background:${cfg.c}"></div>${code} — ${cfg.lb}</div>
    <div class="td3">${desc}</div>
    <div class="tdv"></div>
    <div class="tr2"><span class="tl">ปรากฏใน PLO</span><span class="tv" style="color:#C4B5FD">${plo} รายการ</span></div>
    <div class="tr2"><span class="tl">ปรากฏใน MLO</span><span class="tv" style="color:#FCD34D">${mlo} รายการ</span></div>
    <div class="tr2"><span class="tl">รวม</span><span class="tv" style="color:${cfg.c}">${tot} รายการ</span></div>
  `;
  tipEl.style.visibility='visible';tipEl.style.opacity='1';pT(e);
}
function hT(){tT=setTimeout(()=>{tipEl.style.visibility='hidden';tipEl.style.opacity='0';},80);}
function pT(e){
  const tw=tipEl.offsetWidth,th=tipEl.offsetHeight;
  let x=e.clientX-tw/2,y=e.clientY-th-14;
  if(x<8)x=8;
  if(x+tw>window.innerWidth-8)x=window.innerWidth-tw-8;
  if(y<8){y=e.clientY+18;tipEl.classList.add('up');}else tipEl.classList.remove('up');
  tipEl.style.left=x+'px';tipEl.style.top=y+'px';
}
document.addEventListener('mousemove',e=>{if(tipEl.style.visibility==='visible')pT(e);});
render();
</script>
</body>
</html>
