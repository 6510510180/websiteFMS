<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Template Hub | QA System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F4F6FB; --bg2:#FFFFFF; --bg3:#EEF1F8; --bg4:#E8ECF5;
  --border:#DDE2EF; --text:#1A1D2E; --muted:#6B7299; --sub:#4A5075;
  --blue:#4F8EF7; --purple:#7C5CFC;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#FFFFFF,#F0F4FF);border-bottom:1px solid var(--border);padding:24px 24px 0;}
.header-inner{max-width:1100px;margin:0 auto;}
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
.brand-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#4F8EF7,#7C5CFC);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.brand-title{font-size:20px;font-weight:700;margin:0;}
.brand-sub{font-size:12px;color:var(--muted);margin:0;}
.nav-pills{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:4px;gap:4px;margin-left:auto;}
.nav-pill{padding:7px 14px;border:none;border-radius:9px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;background:transparent;color:var(--muted);}
.nav-pill.active{background:linear-gradient(135deg,#4F8EF7,#7C5CFC);color:#fff;font-weight:600;}

/* ── TABS ── */
.tabs{display:flex;gap:2px;overflow-x:auto;}
.tab-btn{padding:10px 16px;border:none;border-radius:10px 10px 0 0;cursor:pointer;font-size:13px;font-family:inherit;background:transparent;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.tab-btn.active{background:var(--bg);color:var(--text);font-weight:600;border-bottom:2px solid var(--blue);}
.tab-count{margin-left:6px;font-size:11px;padding:1px 6px;border-radius:20px;color:#AAB0CC;}
.tab-btn.active .tab-count{background:#E4EDFF;color:var(--blue);}

/* ── BODY ── */
.body{max-width:1100px;margin:0 auto;padding:28px 24px;}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.count-label{color:var(--muted);font-size:13px;}
.search-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;width:200px;}

/* ── CARDS GRID ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}

/* ── CARD ── */
.tpl-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.tpl-card:hover{background:#FAFBFF;transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,142,247,.12);}
.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.card-icon-wrap{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.card-code{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
.card-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.3;margin:4px 0 0;}
.card-subtitle{font-size:12px;color:var(--muted);margin:0;}
.card-desc{font-size:13px;color:var(--sub);line-height:1.6;margin:0 0 12px;}
.sheets-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
.sheet-tag{font-size:11px;background:var(--bg3);color:var(--muted);padding:3px 8px;border-radius:6px;}
.filename-row{background:var(--bg3);border-radius:8px;padding:7px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;overflow:hidden;}
.filename-text{font-size:11px;color:#6B7299;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-btn{width:100%;padding:10px;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;background:transparent;border:none;text-decoration:none;}

/* ── GUIDE PANEL ── */
.guide-back{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 16px;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:20px;display:inline-flex;align-items:center;gap:6px;}
.guide-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.guide-left{background:var(--bg2);border-radius:16px;padding:24px;}
.guide-right{display:flex;flex-direction:column;gap:16px;}
.guide-steps-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.guide-tips-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;}
.guide-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.guide-icon-lg{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.guide-overview{background:var(--bg3);border-radius:12px;padding:16px;margin-bottom:16px;font-size:14px;color:var(--sub);line-height:1.8;}
.section-label{font-size:11px;color:#6B7299;margin:0 0 8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.sheet-tags-lg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.sheet-tag-lg{background:var(--bg3);border:1px solid var(--border);padding:6px 12px;border-radius:8px;font-size:12px;color:var(--sub);}
.filename-box{background:var(--bg3);border-radius:8px;padding:10px 14px;font-family:monospace;font-size:12px;word-break:break-all;}
.step-list{display:flex;flex-direction:column;gap:10px;}
.step-item{display:flex;gap:12px;align-items:flex-start;}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.step-text{font-size:13px;color:var(--sub);line-height:1.6;margin:0;}
.tip-list{display:flex;flex-direction:column;gap:8px;}
.tip-item{display:flex;gap:10px;align-items:flex-start;border-radius:8px;padding:8px 12px;}
.tip-text{font-size:13px;color:var(--sub);line-height:1.5;margin:0;}

/* ── ADMIN ── */
.admin-banner{background:linear-gradient(135deg,#EEF2FF,#F5F7FF);border:1px solid var(--border);border-radius:16px;padding:22px 26px;margin-bottom:20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.admin-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#4F8EF7,#7C5CFC);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.shortcut-btns{display:flex;gap:6px;flex-wrap:wrap;}
.shortcut-btn{font-size:11px;background:var(--bg2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;color:#6B7299;cursor:pointer;font-family:inherit;transition:all .2s;}
.acc-list{display:flex;flex-direction:column;gap:8px;}
.acc-item{border-radius:14px;overflow:hidden;transition:all .25s;}
.acc-header{width:100%;display:flex;align-items:center;gap:14px;padding:16px 22px;background:none;border:none;cursor:pointer;font-family:inherit;text-align:left;}
.acc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.acc-title{flex:1;font-size:15px;}
.acc-badge{font-size:11px;padding:2px 8px;border-radius:20px;margin-right:8px;}
.acc-chevron{font-size:16px;transition:transform .2s;display:inline-block;}
.acc-body{padding:0 22px 22px;}
.acc-divider{width:100%;height:1px;background:var(--border);margin-bottom:18px;}
.acc-steps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:14px;}
.acc-step{background:var(--bg3);border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;}
.acc-step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.acc-step-label{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin:0;}
.acc-step-detail{font-size:12px;color:var(--muted);line-height:1.5;margin:3px 0 0;}
.acc-tip{border-radius:10px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;}
.acc-tip-text{font-size:12px;color:var(--sub);line-height:1.6;margin:0;}
.info-bar{margin-top:20px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 20px;display:flex;gap:12px;align-items:center;}

/* ── UTIL ── */
.hidden{display:none!important;}
@media(max-width:700px){
  .guide-grid{grid-template-columns:1fr;}
  .cards-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">

</div>

// ══════════════════════════════════════════════════
// STATE

let currentPage   = 'templates';
let currentCat    = 'all';
let currentSearch = '';
let openGuideId   = null;
let openAccIdx    = 0;

// ══════════════════════════════════════════════════
// RENDER CARDS
// ══════════════════════════════════════════════════
function getFiltered() {
  return templates.filter(t => {
    const matchCat    = currentCat === 'all' || t.category === currentCat;
    const q           = currentSearch.toLowerCase();
    const matchSearch = !q || t.title.toLowerCase().includes(q)
                           || t.code.toLowerCase().includes(q)
                           || t.description.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function renderCards() {
  const filtered = getFiltered();
  document.getElementById('countLabel').textContent =
    `แสดง ${filtered.length} จาก ${templates.length} template`;

  document.getElementById('cardsGrid').innerHTML = filtered.map(t => {
    const majorUrl = MAJOR_LINKS[t.code] || null;

    // ปุ่มล่างสุด: ถ้ามี major link → เป็น <a> link; ถ้าไม่มี → เปิด guide panel
    const btnHtml = majorUrl
      ? `<a href="${majorUrl}"
           class="card-btn"
           style="border:1px solid ${t.accent}44;color:${t.accent};"
           onmouseenter="this.style.background='${t.color}22'"
           onmouseleave="this.style.background='transparent'">
           🔗 เปิดข้อมูลวิชาเอก →
         </a>`
      : `<button class="card-btn"
           style="border:1px solid ${t.accent}44;color:${t.accent};"
           onclick="openGuide(${t.id})"
           onmouseenter="this.style.background='${t.color}22'"
           onmouseleave="this.style.background='transparent'">
           📖 ดูคู่มือการใช้งาน →
         </button>`;

    return `
    <div class="tpl-card" id="card-${t.id}"
      onmouseenter="this.style.borderColor='${t.accent}55';this.style.boxShadow='0 8px 24px ${t.accent}22'"
      onmouseleave="this.style.borderColor='';this.style.boxShadow=''">
      <div class="card-top">
        <div class="card-icon-wrap" style="background:${t.color}33">${t.icon}</div>
        <div style="flex:1;min-width:0">
          <span class="card-code" style="color:${t.accent};background:${t.color}22">${t.code}</span>
          <p class="card-title">${t.title}</p>
          <p class="card-subtitle">${t.subtitle}</p>

      <p class="card-desc">${t.description}</p>
      <div class="sheets-row">${t.sheets.map(s=>`<span class="sheet-tag">📄 ${s}</span>`).join('')}</div>
      <div class="filename-row">
        <span>📁</span>
        <span class="filename-text">${t.filename}</span>

      <button class="card-btn"

        onmouseleave="this.style.background='transparent'">

    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════
// PAGE / FILTER CONTROLS
// ══════════════════════════════════════════════════
function showPage(page) {
  currentPage = page;
  document.getElementById('pageTemplates').classList.toggle('hidden', page !== 'templates');
  document.getElementById('pageAdmin').classList.toggle('hidden', page !== 'admin');
  document.getElementById('tabsRow').classList.toggle('hidden', page !== 'templates');
  document.getElementById('pillTemplates').classList.toggle('active', page === 'templates');
  document.getElementById('pillAdmin').classList.toggle('active', page === 'admin');
  if (page === 'admin')     renderAdmin();
  if (page === 'templates') { closeGuide(); renderCards(); }
}

function setCategory(cat) {
  currentCat = cat;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.cat === cat));
  renderCards();
}

function filterTemplates() {
  currentSearch = document.getElementById('searchInput').value;
  renderCards();
}

// ══════════════════════════════════════════════════
// DOWNLOAD TEMPLATE
// ══════════════════════════════════════════════════
function downloadTemplate(code) {
  const info = FILE_DATA[code];
  if (!info) { alert('ไม่พบไฟล์ template: ' + code); return; }
  const bytes = atob(info.b64);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  const blob = new Blob([arr], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = info.filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
