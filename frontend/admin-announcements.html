<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin — จัดการประกาศ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --purple: #9b51e0;
            --purple-light: #f3e8ff;
            --purple-mid: #c084fc;
            --orange: #f2994a;
            --green: #27ae60;
            --red: #e74c3c;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #eee;
            --gray-400: #bbb;
            --gray-600: #666;
            --gray-800: #333;
            --shadow: 0 4px 20px rgba(155,81,224,0.10);
            --shadow-hover: 0 8px 32px rgba(155,81,224,0.18);
            --radius: 14px;
            --radius-sm: 8px;
        }
        body { font-family: 'Sarabun', sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }

        /* ── Topbar ── */
        .topbar {
            background: #fff;
            border-bottom: 1px solid var(--gray-200);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0,0,0,.04);
        }
        .topbar-left { display: flex; align-items: center; gap: 14px; }
        .topbar-icon { width: 34px; height: 34px; border-radius: 10px; background: var(--purple-light); display: flex; align-items: center; justify-content: center; color: var(--purple); font-size: 15px; }
        .topbar h1 { font-size: 17px; font-weight: 700; color: var(--gray-800); }
        .topbar-sub { font-size: 12px; color: var(--gray-400); font-weight: 400; }
        .btn-back { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1.5px solid var(--gray-200); border-radius: 8px; background: #fff; color: var(--gray-600); font-size: 13px; font-family: inherit; cursor: pointer; text-decoration: none; transition: .15s; }
        .btn-back:hover { border-color: var(--purple); color: var(--purple); }

        /* ── Layout ── */
        .page { display: grid; grid-template-columns: 1fr 380px; gap: 24px; padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

        /* ── Card ── */
        .card { background: #fff; border-radius: var(--radius); border: 1px solid var(--gray-200); padding: 24px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 15px; font-weight: 700; }
        .badge-count { background: var(--purple-light); color: var(--purple); font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }

        /* ── Form ── */
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--gray-800); }
        label span.req { color: var(--red); margin-left: 3px; }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'Sarabun', sans-serif;
            color: var(--gray-800);
            background: #fff;
            transition: border-color .15s, box-shadow .15s;
            outline: none;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(155,81,224,.10);
        }
        textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .char-count { text-align: right; font-size: 11px; color: var(--gray-400); margin-top: 4px; }

        /* ── Buttons ── */
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; font-weight: 600; cursor: pointer; border: none; transition: .15s; }
        .btn-primary { background: var(--purple); color: #fff; }
        .btn-primary:hover { background: #7c3aed; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(155,81,224,.3); }
        .btn-secondary { background: var(--gray-100); color: var(--gray-600); border: 1.5px solid var(--gray-200); }
        .btn-secondary:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-light); }
        .btn-danger { background: #fef2f2; color: var(--red); border: 1.5px solid #fee2e2; }
        .btn-danger:hover { background: var(--red); color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-full { width: 100%; justify-content: center; }
        .btn-group { display: flex; gap: 10px; margin-top: 4px; }

        /* ── Priority pill ── */
        .priority-selector { display: flex; gap: 8px; }
        .priority-opt { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--gray-200); font-size: 13px; cursor: pointer; transition: .15s; user-select: none; }
        .priority-opt:hover { border-color: var(--purple); }
        .priority-opt.active-high { background: #fef2f2; border-color: #fecaca; color: var(--red); }
        .priority-opt.active-medium { background: #fffbeb; border-color: #fde68a; color: #d97706; }
        .priority-opt.active-low { background: var(--purple-light); border-color: #ddd6fe; color: var(--purple); }

        /* ── Announcement List ── */
        .announce-list { display: flex; flex-direction: column; gap: 12px; }
        .announce-item {
            padding: 16px 18px;
            border: 1.5px solid var(--gray-200);
            border-radius: 12px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
            transition: .2s;
            position: relative;
            cursor: default;
        }
        .announce-item:hover { border-color: var(--purple-mid); box-shadow: var(--shadow); }
        .announce-item.editing { border-color: var(--purple); background: #fdfaff; }
        .announce-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
        .dot-high { background: var(--red); }
        .dot-medium { background: #f59e0b; }
        .dot-low { background: var(--purple-mid); }
        .announce-body { flex: 1; min-width: 0; }
        .announce-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .announce-item-title { font-size: 14px; font-weight: 700; }
        .tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .3px; }
        .tag-high { background: #fef2f2; color: var(--red); }
        .tag-medium { background: #fffbeb; color: #d97706; }
        .tag-low { background: var(--purple-light); color: var(--purple); }
        .tag-pinned { background: #ecfdf5; color: var(--green); }
        .announce-desc { font-size: 13px; color: var(--gray-600); line-height: 1.5; margin-bottom: 6px; }
        .announce-meta { font-size: 11px; color: var(--gray-400); display: flex; gap: 12px; flex-wrap: wrap; }
        .announce-meta i { font-size: 10px; }
        .announce-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .icon-btn { width: 30px; height: 30px; border-radius: 8px; border: 1.5px solid var(--gray-200); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--gray-600); transition: .15s; }
        .icon-btn:hover.edit { border-color: var(--purple); color: var(--purple); background: var(--purple-light); }
        .icon-btn:hover.delete { border-color: var(--red); color: var(--red); background: #fef2f2; }
        .icon-btn:hover.pin { border-color: var(--green); color: var(--green); background: #ecfdf5; }
        .icon-btn.active-pin { border-color: var(--green); color: var(--green); background: #ecfdf5; }

        /* ── Empty state ── */
        .empty-state { text-align: center; padding: 48px 20px; color: var(--gray-400); }
        .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; opacity: .4; }
        .empty-state p { font-size: 14px; }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 28px; right: 28px;
            background: #1a1a2e; color: #fff;
            padding: 12px 20px; border-radius: 10px;
            font-size: 13px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,.2);
            transform: translateY(80px); opacity: 0;
            transition: .3s cubic-bezier(.34,1.56,.64,1);
            z-index: 9999; pointer-events: none; max-width: 320px;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
        #toast.success i { color: #6ee7b7; }
        #toast.error i { color: #fca5a5; }

        /* ── Stats ── */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 10px; padding: 14px; text-align: center; }
        .stat-num { font-size: 24px; font-weight: 700; color: var(--purple); }
        .stat-label { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

        /* ── Divider ── */
        .divider { border: none; border-top: 1px solid var(--gray-100); margin: 20px 0; }

        /* ── Search bar ── */
        .search-bar { position: relative; margin-bottom: 16px; }
        .search-bar input { padding-left: 36px; }
        .search-bar i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 13px; }

        /* ── Drag handle ── */
        .drag-handle { color: var(--gray-400); font-size: 13px; cursor: grab; padding: 2px 4px; }
        .drag-handle:active { cursor: grabbing; }

        @media (max-width: 900px) {
            .page { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <div class="topbar-icon"><i class="fa-regular fa-bell"></i></div>
        <div>
            <div class="topbar h1" style="font-size:17px;font-weight:700;">จัดการประกาศ</div>
            <div class="topbar-sub">Admin Panel — Announcements</div>
        </div>
    </div>
    <a href="bba-home.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> กลับหน้าหลัก</a>
</div>

<div class="page">
    <!-- Left: Form -->
    <div>
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-num" id="statTotal">0</div>
                <div class="stat-label">ทั้งหมด</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statPinned" style="color:#27ae60;">0</div>
                <div class="stat-label">ปักหมุด</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statHigh" style="color:#e74c3c;">0</div>
                <div class="stat-label">สำคัญมาก</div>
            </div>
        </div>

        <!-- Form Card -->
        <div class="card" id="formCard">
            <div class="card-header">
                <span class="card-title" id="formTitle"><i class="fa-solid fa-plus" style="color:var(--purple);margin-right:6px;"></i>เพิ่มประกาศใหม่</span>
            </div>

            <input type="hidden" id="editId">

            <div class="form-group">
                <label>หัวข้อประกาศ <span class="req">*</span></label>
                <input type="text" id="inTitle" placeholder="เช่น Registration Deadline" maxlength="100" oninput="updateChar('inTitle','charTitle',100)">
                <div class="char-count"><span id="charTitle">0</span>/100</div>
            </div>

            <div class="form-group">
                <label>รายละเอียด <span class="req">*</span></label>
                <textarea id="inDesc" placeholder="รายละเอียดประกาศ..." maxlength="300" oninput="updateChar('inDesc','charDesc',300)"></textarea>
                <div class="char-count"><span id="charDesc">0</span>/300</div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>หมวดหมู่</label>
                    <select id="inCategory">
                        <option value="ทั่วไป">ทั่วไป</option>
                        <option value="การเรียน">การเรียน</option>
                        <option value="กิจกรรม">กิจกรรม</option>
                        <option value="ทุนการศึกษา">ทุนการศึกษา</option>
                        <option value="IT/ระบบ">IT/ระบบ</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>วันที่แสดง</label>
                    <input type="text" id="inDate" placeholder="เช่น 2 hours ago, Oct 20">
                </div>
            </div>

            <div class="form-group">
                <label>ระดับความสำคัญ</label>
                <div class="priority-selector" id="prioritySelector">
                    <div class="priority-opt" data-val="high" onclick="setPriority('high')">🔴 สำคัญมาก</div>
                    <div class="priority-opt" data-val="medium" onclick="setPriority('medium')">🟡 ปานกลาง</div>
                    <div class="priority-opt active-low" data-val="low" onclick="setPriority('low')">🔵 ทั่วไป</div>
                </div>
                <input type="hidden" id="inPriority" value="low">
            </div>

            <hr class="divider">

            <div class="btn-group">
                <button class="btn btn-primary" onclick="saveAnnouncement()"><i class="fa-solid fa-floppy-disk"></i> <span id="saveLabel">บันทึกประกาศ</span></button>
                <button class="btn btn-secondary" onclick="resetForm()" id="cancelBtn" style="display:none;"><i class="fa-solid fa-xmark"></i> ยกเลิก</button>
            </div>
        </div>
    </div>

    <!-- Right: List -->
    <div>
        <div class="card">
            <div class="card-header">
                <span class="card-title">รายการประกาศ</span>
                <span class="badge-count" id="listCount">0 รายการ</span>
            </div>

            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="ค้นหาประกาศ..." oninput="renderList()">
            </div>

            <div class="announce-list" id="announceList">
                <div class="empty-state"><i class="fa-regular fa-bell-slash"></i><p>ยังไม่มีประกาศ<br>เพิ่มประกาศแรกได้เลย!</p></div>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast"><i class="fa-solid fa-check-circle"></i> <span id="toastMsg"></span></div>

<script>
let announcements = [];
let currentPriority = 'low';

// ── Load ──────────────────────────────────────────────────────
async function load() {
    const res = await fetch("http://localhost:3000/api/announcements");
    announcements = await res.json();
    renderAll();
}

function getDefaults() {
    return [
        { id: Date.now()-3000, title: 'Registration Deadline', desc: 'Fall 2024 registration closes in 3 days.', category: 'การเรียน', date: '2 hours ago', priority: 'high', pinned: false, createdAt: new Date().toISOString() },
        { id: Date.now()-2000, title: 'Campus Job Fair', desc: 'Join us at the Student Center this Friday.', category: 'กิจกรรม', date: 'Yesterday', priority: 'medium', pinned: false, createdAt: new Date().toISOString() },
        { id: Date.now()-1000, title: 'Library Hours Extended', desc: 'The main library will be open 24/7 during exam week.', category: 'ทั่วไป', date: 'Oct 20', priority: 'low', pinned: false, createdAt: new Date().toISOString() },
    ];
}

function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(announcements));
}

// ── Render ────────────────────────────────────────────────────
function renderAll() { renderList(); updateStats(); }

function renderList() {
    const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
    const list = document.getElementById('announceList');
    const editId = parseInt(document.getElementById('editId').value) || null;

    let filtered = announcements.filter(a =>
        !q || a.title.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q)
    );

    // sort: pinned → priority order → createdAt
    const pOrder = { high: 0, medium: 1, low: 2 };
    filtered.sort((a, b) => {
        if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
        return (pOrder[a.priority] ?? 9) - (pOrder[b.priority] ?? 9);
    });

    document.getElementById('listCount').textContent = filtered.length + ' รายการ';

    if (!filtered.length) {
        list.innerHTML = `<div class="empty-state"><i class="fa-regular fa-bell-slash"></i><p>${q ? 'ไม่พบประกาศที่ค้นหา' : 'ยังไม่มีประกาศ<br>เพิ่มประกาศแรกได้เลย!'}</p></div>`;
        return;
    }

    list.innerHTML = filtered.map(a => `
        <div class="announce-item${editId === a.id ? ' editing' : ''}" id="item-${a.id}">
            <div class="drag-handle"><i class="fa-solid fa-grip-vertical"></i></div>
            <div class="announce-dot dot-${a.priority}"></div>
            <div class="announce-body">
                <div class="announce-title-row">
                    <span class="announce-item-title">${escHtml(a.title)}</span>
                    <span class="tag tag-${a.priority}">${{high:'สำคัญมาก',medium:'ปานกลาง',low:'ทั่วไป'}[a.priority]}</span>
                    ${a.pinned ? '<span class="tag tag-pinned">📌 ปักหมุด</span>' : ''}
                </div>
                <div class="announce-desc">${escHtml(a.description)}</div>
                <div class="announce-meta">
                    <span><i class="fa-solid fa-tag"></i> ${escHtml(a.category)}</span>
                    <span>${escHtml(a.display_date)}</span>
                </div>
            </div>
            <div class="announce-actions">
                <button class="icon-btn pin ${a.pinned ? 'active-pin' : ''}" onclick="togglePin(${a.id})" title="${a.pinned ? 'เลิกปักหมุด' : 'ปักหมุด'}"><i class="fa-solid fa-thumbtack"></i></button>
                <button class="icon-btn edit" onclick="editAnnouncement(${a.id})" title="แก้ไข"><i class="fa-solid fa-pen"></i></button>
                <button class="icon-btn delete" onclick="deleteAnnouncement(${a.id})" title="ลบ"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
    `).join('');
}

function updateStats() {
    document.getElementById('statTotal').textContent = announcements.length;
    document.getElementById('statPinned').textContent = announcements.filter(a => a.pinned).length;
    document.getElementById('statHigh').textContent = announcements.filter(a => a.priority === 'high').length;
}

// ── CRUD ──────────────────────────────────────────────────────
async function saveAnnouncement() {
    const title = document.getElementById('inTitle').value.trim();
    const desc  = document.getElementById('inDesc').value.trim();
    const category = document.getElementById('inCategory').value;
    const date  = document.getElementById('inDate').value.trim() || formatNow();
    const priority = document.getElementById('inPriority').value;
    const editId = document.getElementById('editId').value;

    if (!title || !desc) return;

    if (editId) {
        await fetch(`http://localhost:3000/api/announcements/${editId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, description: desc, category, display_date: date, priority })
        });
    } else {
        await fetch("http://localhost:3000/api/announcements", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, description: desc, category, display_date: date, priority })
        });
    }

    load();
    resetForm();
}

function editAnnouncement(id) {
    const a = announcements.find(x => x.id === id);
    if (!a) return;
    document.getElementById('editId').value = a.id;
    document.getElementById('inTitle').value = a.title;
    document.getElementById('inDesc').value  = a.description;
    document.getElementById('inCategory').value = a.category;
    document.getElementById('inDate').value  = a.display_date;
    setPriority(a.priority);
    updateChar('inTitle','charTitle',100);
    updateChar('inDesc','charDesc',300);
    document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen" style="color:var(--purple);margin-right:6px;"></i>แก้ไขประกาศ';
    document.getElementById('saveLabel').textContent = 'บันทึกการแก้ไข';
    document.getElementById('cancelBtn').style.display = 'inline-flex';
    document.getElementById('inTitle').focus();
    document.getElementById('formCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    renderList();
}

async function deleteAnnouncement(id) {
    if (!confirm('ต้องการลบ?')) return;

    await fetch(`http://localhost:3000/api/announcements/${id}`, {
        method: "DELETE"
    });

    load();
}

async function togglePin(id) {
    const a = announcements.find(x => x.id === id);
    if (!a) return;

    const newPinned = !a.pinned;

    await fetch(`http://localhost:3000/api/announcements/${id}/pin`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pinned: newPinned })
    });

    load();
    showToast(newPinned ? '📌 ปักหมุดแล้ว' : 'เลิกปักหมุดแล้ว', 'success');
}

function resetForm() {
    document.getElementById('editId').value = '';
    document.getElementById('inTitle').value = '';
    document.getElementById('inDesc').value  = '';
    document.getElementById('inDate').value  = '';
    document.getElementById('inCategory').value = 'ทั่วไป';
    setPriority('low');
    updateChar('inTitle','charTitle',100);
    updateChar('inDesc','charDesc',300);
    document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-plus" style="color:var(--purple);margin-right:6px;"></i>เพิ่มประกาศใหม่';
    document.getElementById('saveLabel').textContent = 'บันทึกประกาศ';
    document.getElementById('cancelBtn').style.display = 'none';
    renderList();
}

// ── Helpers ───────────────────────────────────────────────────
function setPriority(val) {
    currentPriority = val;
    document.getElementById('inPriority').value = val;
    document.querySelectorAll('.priority-opt').forEach(el => {
        el.className = 'priority-opt';
        if (el.dataset.val === val) el.classList.add('active-' + val);
    });
}

function updateChar(inputId, countId, max) {
    const len = document.getElementById(inputId).value.length;
    document.getElementById(countId).textContent = len;
    document.getElementById(countId).style.color = len > max * 0.9 ? '#e74c3c' : '';
}

function formatNow() {
    const d = new Date();
    return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
}

function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    const icon = t.querySelector('i');
    document.getElementById('toastMsg').textContent = msg;
    t.className = type;
    icon.className = type === 'success' ? 'fa-solid fa-check-circle' : 'fa-solid fa-circle-exclamation';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Init ──────────────────────────────────────────────────────
load();
</script>
</body>
</html>
